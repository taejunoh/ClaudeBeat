name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    env:
      TEAM_ID: "3BMF4LM6TM"
      APP_NAME: "ClaudeBeat"
      PROJECT_DIR: "ClaudeBeat"
      SCHEME: "ClaudeBeat"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Select Xcode
        run: |
          ls /Applications/ | grep -i Xcode
          sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || echo /Applications/Xcode.app)"
          xcodebuild -version

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          echo "Decoded cert file info:"
          ls -la "$CERT_PATH"
          file "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed -e 's/"//g' | tr -d '\n')

      - name: Archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd "$PROJECT_DIR"
          xcodebuild \
            -project "${SCHEME}.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath build \
            -archivePath build/${APP_NAME}.xcarchive \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGN_IDENTITY="Developer ID Application: Taejun Oh (${TEAM_ID})" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            -skipPackagePluginValidation \
            archive

      - name: Export archive
        run: |
          cd "$PROJECT_DIR"
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/${APP_NAME}.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Zip for notarization
        run: |
          cd "$PROJECT_DIR/build/export"
          ditto -c -k --sequesterRsrc --keepParent "${APP_NAME}.app" "${APP_NAME}.zip"

      - name: Notarize
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${API_KEY_ID}.p8"
          printf '%s' "$API_KEY_CONTENT" > "$KEY_PATH"

          xcrun notarytool submit \
            "$PROJECT_DIR/build/export/${APP_NAME}.zip" \
            --key "$KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait

      - name: Staple and re-zip
        run: |
          xcrun stapler staple "$PROJECT_DIR/build/export/${APP_NAME}.app"
          rm "$PROJECT_DIR/build/export/${APP_NAME}.zip"
          cd "$PROJECT_DIR/build/export"
          ditto -c -k --sequesterRsrc --keepParent "${APP_NAME}.app" "${APP_NAME}.zip"

      - name: Compute SHA256
        id: hash
        run: |
          SHA=$(shasum -a 256 "$PROJECT_DIR/build/export/${APP_NAME}.zip" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "$PROJECT_DIR/build/export/${APP_NAME}.zip" \
            --title "${APP_NAME} ${GITHUB_REF_NAME}" \
            --generate-notes

      - name: Update Homebrew tap
        env:
          TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.hash.outputs.sha256 }}
        run: |
          git clone "https://x-access-token:${TAP_PUSH_TOKEN}@github.com/taejunoh/homebrew-tap.git" tap
          cd tap

          sed -i '' -E "s/^( *version )\".*\"/\1\"${VERSION}\"/" Casks/claudebeat.rb
          sed -i '' -E "s/^( *sha256 )\".*\"/\1\"${SHA256}\"/" Casks/claudebeat.rb

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/claudebeat.rb
          git diff --cached
          git commit -m "claudebeat ${VERSION}"
          git push

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
