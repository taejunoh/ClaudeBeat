name: ClaudeBeat
options:
  bundleIdPrefix: com.claudebeat
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false

targets:
  ClaudeBeat:
    type: application
    platform: macOS
    sources:
      - path: ClaudeBeat
        excludes:
          - Info.plist
    info:
      path: ClaudeBeat/Info.plist
      properties:
        LSUIElement: true
        CFBundleIconFile: AppIcon
        CFBundleDisplayName: ClaudeBeat
        CFBundleName: ClaudeBeat
        CFBundleIdentifier: com.claudebeat.macos
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
    entitlements:
      path: ClaudeBeat/ClaudeBeat.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudebeat.macos
        PRODUCT_NAME: ClaudeBeat
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application: Taejun Oh (3BMF4LM6TM)"
        DEVELOPMENT_TEAM: "3BMF4LM6TM"
        CODE_SIGNING_ALLOWED: true
        CODE_SIGNING_REQUIRED: true
        INFOPLIST_FILE: ClaudeBeat/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ENABLE_HARDENED_RUNTIME: true
        OTHER_CODE_SIGN_FLAGS: "--timestamp"

  ClaudeBeatTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClaudeBeatTests
    dependencies:
      - target: ClaudeBeat
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ClaudeBeat.app/Contents/MacOS/ClaudeBeat"
